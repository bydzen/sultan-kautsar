<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <title>Thank You - Sultan Kautsar</title>
        <meta name="robots" content="noindex, nofollow" />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family:
                    "Inter",
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    sans-serif;
                background-color: #f8f9fa;
                color: #333;
                line-height: 1.6;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
            }
            .container {
                max-width: 600px;
                width: 100%;
                background: white;
                border-radius: 12px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
                padding: 60px 40px;
                text-align: center;
                animation: fadeIn 0.6s ease-out;
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            .icon {
                width: 80px;
                height: 80px;
                background-color: #22c55e;
                border-radius: 50%;
                margin: 0 auto 30px;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .checkmark {
                width: 40px;
                height: 40px;
                border: 4px solid white;
                border-radius: 50%;
                position: relative;
            }
            .checkmark::after {
                content: "";
                position: absolute;
                left: 8px;
                top: 3px;
                width: 12px;
                height: 20px;
                border: solid white;
                border-width: 0 4px 4px 0;
                transform: rotate(45deg);
            }
            h1 {
                font-size: 2.5rem;
                font-weight: 700;
                color: #1a202c;
                margin-bottom: 20px;
            }
            p {
                font-size: 1.125rem;
                color: #64748b;
                margin-bottom: 30px;
            }
            .button {
                display: inline-block;
                background-color: #1152d4;
                color: white;
                text-decoration: none;
                padding: 14px 32px;
                border-radius: 8px;
                font-weight: 600;
                font-size: 1rem;
                transition: background-color 0.3s ease;
            }
            .button:hover {
                background-color: #0d3ea8;
            }
            @media (max-width: 640px) {
                .container {
                    padding: 40px 24px;
                }
                h1 {
                    font-size: 2rem;
                }
                p {
                    font-size: 1rem;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="icon">
                <div class="checkmark"></div>
            </div>
            <h1>Thank You!</h1>
            <p>I've received your request and appreciate you reaching out. I'll get back to you within 24 hours.</p>
            <a href="/tagmanager.html" class="button">Back to Home</a>
        </div>
    </body>
</html>
